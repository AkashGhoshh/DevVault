<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Dump Yard</title>
    <!-- Tailwind CSS (CDN for zero-build setup) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155'
                        },
                        accent: '#38bdf8'
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- PDF Export & Syntax Highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/contrib/auto-render.min.js"></script>
    
    <!-- Google API & Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body class="bg-dark-900 text-slate-300 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Top Navbar -->
    <nav class="glass-header border-b border-slate-700/50 px-6 py-3 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-dumpster"></i>
            </div>
            <h1 class="text-xl font-semibold text-white tracking-tight">Dump Yard <span class="text-xs text-slate-400 font-normal">v1.0</span></h1>
        </div>
        <div class="flex gap-4 items-center">
            <!-- Storage Settings -->
            <button id="storageSettingsBtn" class="text-xs px-3 py-1.5 rounded bg-slate-800 border border-slate-700 hover:bg-slate-700 transition-colors flex items-center gap-2 text-slate-300" onclick="window.openStorageSettings()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span id="activeStorageIndicator">Storage: LocalStorage</span>
            </button>

            <!-- App Mode Toggle -->
            <div class="flex bg-slate-900 rounded-md border border-slate-700 overflow-hidden p-0.5 shadow-inner">
                <button id="modeEditBtn" class="px-4 py-1 text-xs font-bold uppercase transition-colors bg-slate-700 text-white rounded shadow-sm" onclick="window.toggleAppMode('edit')">
                    <i class="fa-solid fa-pen-to-square mr-1"></i> Edit
                </button>
                <button id="modeReadBtn" class="px-4 py-1 text-xs font-bold uppercase transition-colors text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded" onclick="window.toggleAppMode('read')">
                    <i class="fa-solid fa-book-open mr-1"></i> Read
                </button>
            </div>
            
            <button id="toggleVim" class="text-xs px-3 py-1.5 rounded bg-slate-800 border border-slate-700 hover:bg-slate-700 transition-colors ml-2">
                <i class="fa-solid fa-keyboard mr-1"></i> Vim Mode: <span id="vimStatus" class="text-slate-400">OFF</span>
            </button>
            <button id="exportPdfBtn" class="text-sm px-4 py-1.5 rounded-md bg-accent text-slate-900 font-medium hover:bg-sky-300 transition-colors shadow-lg shadow-sky-500/20">
                <i class="fa-solid fa-file-pdf mr-1"></i> Export PDF
            </button>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar for Notes/Tabs -->
        <aside class="w-64 bg-[#0B1120] border-r border-slate-800 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-800">
                <button id="newNoteBtn" class="w-full flex items-center justify-start gap-2 px-3 py-2.5 rounded-lg bg-accent text-slate-900 hover:bg-sky-300 transition-all font-semibold shadow-lg shadow-sky-500/10">
                    <i class="fa-solid fa-plus"></i> New Dump
                </button>
            </div>
            <div class="px-4 pt-3 pb-1 text-xs font-semibold text-slate-500 tracking-wider uppercase">Your Dumps</div>
            <div id="notesList" class="flex-1 overflow-y-auto custom-scrollbar p-2 flex flex-col gap-1">
                <!-- Dynamically populated list of tabs -->
            </div>
        </aside>

        <!-- Editor & Preview Container -->
        <div class="flex-1 flex overflow-hidden transition-all duration-300">
            <!-- Editor Section -->
            <section id="editor-section" class="w-1/2 flex flex-col border-r border-slate-800 bg-[#1e1e1e] relative transition-all duration-300">
            <div class="text-xs font-mono text-slate-500 bg-black/40 px-4 py-2 border-b border-slate-800 flex justify-between">
                <span>INPUT // RAW LOGS & NOTES</span>
                <span id="saveStatus" class="text-green-400"><i class="fa-solid fa-check mr-1"></i>Saved to LocalStorage</span>
            </div>
            <!-- CodeMirror mounts here -->
            <div id="editor-container" class="flex-1 overflow-hidden font-mono text-sm"></div>
        </section>

        <!-- Preview Section -->
        <section id="preview-section" class="w-1/2 flex flex-col bg-dark-900 relative transition-all duration-300">
            <div class="text-xs font-mono text-slate-500 bg-slate-800/50 px-4 py-2 border-b border-slate-800 flex justify-between items-center backdrop-blur-md">
                <span>PREVIEW // RENDERED</span>
                <div class="flex gap-2">
                    <button class="hover:text-white" title="Format Document"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                </div>
            </div>
            <!-- Rendered content -->
            <div id="preview-container" class="flex-1 overflow-y-auto p-8 custom-scrollbar markdown-body">
                <div class="text-slate-500 flex flex-col items-center justify-center h-full opacity-50">
                    <i class="fa-solid fa-robot text-4xl mb-4"></i>
                    <p>Paste your AI logs or markdown to begin.</p>
                </div>
            </div>
        </section>
        </div>
    </main>

    <!-- Storage Settings Modal -->
    <div id="storageModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-[450px] overflow-hidden transform transition-all scale-95 opacity-0" id="storageModalContent">
            <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/50">
                <h2 class="text-lg font-semibold text-white"><i class="fa-solid fa-cloud-arrow-up text-accent mr-2"></i>Storage Settings</h2>
                <button class="text-slate-400 hover:text-white transition-colors" onclick="window.closeStorageSettings()"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <p class="text-xs text-slate-400 mb-2">Choose where your notes are saved. You can change this at any time.</p>
                
                <!-- LocalStorage Option -->
                <button class="w-full flex items-start gap-4 p-4 rounded-lg border border-slate-700 bg-slate-800/50 hover:bg-slate-800 hover:border-slate-500 transition-all text-left group" onclick="window.setStorageMode('localstorage')">
                    <div class="mt-1 text-slate-400 group-hover:text-white"><i class="fa-solid fa-browser fa-lg"></i></div>
                    <div>
                        <div class="font-semibold text-white text-sm">Browser Memory (Default)</div>
                        <div class="text-xs text-slate-400 mt-1">Saves in this browser only. Data is lost if you clear history.</div>
                    </div>
                </button>

                <!-- Local Folder Option -->
                <button class="w-full flex items-start gap-4 p-4 rounded-lg border border-slate-700 bg-slate-800/50 hover:bg-slate-800 hover:border-slate-500 transition-all text-left group" onclick="window.setStorageMode('localfolder')">
                    <div class="mt-1 text-amber-500"><i class="fa-solid fa-folder-open fa-lg"></i></div>
                    <div>
                        <div class="font-semibold text-white text-sm">Local PC Folder</div>
                        <div class="text-xs text-slate-400 mt-1">Select a folder on your hard drive to save pure .md files. 100% Offline.</div>
                    </div>
                </button>

                <!-- Google Drive Option -->
                <button class="w-full flex items-start gap-4 p-4 rounded-lg border border-slate-700 bg-slate-800/50 hover:bg-slate-800 hover:border-slate-500 transition-all text-left group relative overflow-hidden" onclick="window.setStorageMode('gdrive')">
                    <div class="mt-1 text-green-500"><i class="fa-brands fa-google-drive fa-lg"></i></div>
                    <div>
                        <div class="font-semibold text-white text-sm">Google Drive Sync</div>
                        <div class="text-xs text-slate-400 mt-1">Syncs across devices. Saves in a private 'DumpYard' folder on your Drive.</div>
                    </div>
                </button>
                
                <div class="pt-4 border-t border-slate-800 hidden" id="migrationSection">
                    <p class="text-xs font-semibold text-slate-300 mb-2">Migration Tools</p>
                    <button class="w-full flex justify-center items-center gap-2 py-2 rounded bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600 hover:text-white border border-indigo-600/50 transition-colors text-sm font-medium" onclick="window.migrateLocalToDrive()">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Migrate Local Folder to Google Drive
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Storage Manager & ESM Modules Script -->
    <script src="storage.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
